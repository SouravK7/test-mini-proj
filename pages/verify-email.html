<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Email | Digital Calendar for Academic Institute</title>
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/pages.css">
    <link rel="stylesheet" href="../css/theme-toggle.css">
    <script src="../js/theme.js"></script>
</head>

<body>
    <div class="login-page">
        <button class="theme-toggle login-theme-toggle" aria-label="Toggle theme"><span class="theme-toggle-knob"><i
                    class="fa-solid fa-moon theme-toggle-icon theme-toggle-icon-dark"></i><i
                    class="fa-solid fa-sun theme-toggle-icon theme-toggle-icon-light"></i></span></button>

        <div class="login-container">
            <div class="login-card">
                <div class="login-header">
                    <div class="login-logo" id="status-icon"><i class="fa-solid fa-spinner fa-spin"></i></div>
                    <h1 class="login-title" id="status-title">Verifying…</h1>
                    <p class="login-subtitle" id="status-msg">Please wait while we verify your email address.</p>
                </div>

                <div class="login-body" id="action-area" style="display:none;">
                    <a href="../login.html" class="btn btn-primary btn-lg w-full" id="action-btn">Go to Login</a>
                </div>

                <div class="login-footer">
                    <a href="../index.html">← Back to Public Calendar</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const BASE_URL = `http://${window.location.hostname}:3000`;

        async function verify() {
            const params = new URLSearchParams(window.location.search);
            const token = params.get('token');

            const icon = document.getElementById('status-icon');
            const title = document.getElementById('status-title');
            const msg = document.getElementById('status-msg');
            const area = document.getElementById('action-area');
            const btn = document.getElementById('action-btn');

            if (!token) {
                icon.innerHTML = '<i class="fa-solid fa-circle-xmark" style="color:var(--color-error)"></i>';
                title.textContent = 'Invalid Link';
                msg.textContent = 'No verification token found in the URL.';
                area.style.display = '';
                btn.textContent = 'Go to Login';
                return;
            }

            try {
                const res = await fetch(`${BASE_URL}/api/auth/verify-email?token=${encodeURIComponent(token)}`);
                const data = await res.json();

                if (data.success) {
                    icon.innerHTML = '<i class="fa-solid fa-circle-check" style="color:var(--color-success)"></i>';
                    title.textContent = 'Email Verified!';
                    msg.textContent = 'Your account is now active. You can log in.';
                    btn.textContent = 'Sign In';
                } else {
                    icon.innerHTML = '<i class="fa-solid fa-circle-xmark" style="color:var(--color-error)"></i>';
                    title.textContent = 'Verification Failed';
                    msg.textContent = data.error || 'The link is invalid or has expired.';
                    btn.textContent = 'Go to Login';
                }
            } catch (e) {
                icon.innerHTML = '<i class="fa-solid fa-circle-xmark" style="color:var(--color-error)"></i>';
                title.textContent = 'Network Error';
                msg.textContent = 'Could not reach the server. Please try again later.';
                btn.textContent = 'Go to Login';
            }

            area.style.display = '';
        }

        verify();
    </script>
</body>

</html>
