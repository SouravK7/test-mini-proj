<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Digital Calendar for Academic Institute</title>
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/pages.css">
    <link rel="stylesheet" href="../css/theme-toggle.css">
    <script src="../js/theme.js"></script>
</head>

<body>
    <div class="login-page">
        <button class="theme-toggle login-theme-toggle" aria-label="Toggle theme"><span class="theme-toggle-knob"><i
                    class="fa-solid fa-moon theme-toggle-icon theme-toggle-icon-dark"></i><i
                    class="fa-solid fa-sun theme-toggle-icon theme-toggle-icon-light"></i></span></button>

        <div class="login-container">
            <div class="login-card">
                <div class="login-header">
                    <div class="login-logo" id="status-icon"><i class="fa-solid fa-lock-open"></i></div>
                    <h1 class="login-title" id="page-title">Reset Password</h1>
                    <p class="login-subtitle" id="page-subtitle">Enter your new password below.</p>
                </div>

                <div class="login-body">
                    <!-- Reset form -->
                    <form id="reset-form">
                        <div class="form-group">
                            <label class="form-label required" for="new-password">New Password</label>
                            <input type="password" id="new-password" class="form-input"
                                placeholder="Minimum 6 characters" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label required" for="confirm-password">Confirm Password</label>
                            <input type="password" id="confirm-password" class="form-input"
                                placeholder="Re-enter new password" required>
                        </div>
                        <button type="submit" class="btn btn-primary btn-lg w-full" id="reset-btn">
                            Reset Password
                        </button>
                    </form>

                    <!-- Shown on success or invalid token -->
                    <div id="result-panel" style="display:none; text-align:center; padding: 8px 0;">
                        <div id="result-icon" style="font-size:3rem; margin-bottom:12px;"></div>
                        <h2 id="result-title" style="margin-bottom:8px;"></h2>
                        <p id="result-msg" class="text-secondary" style="margin-bottom:20px;"></p>
                        <a href="../login.html" class="btn btn-primary btn-lg w-full">Go to Login</a>
                    </div>
                </div>

                <div class="login-footer">
                    <a href="../login.html"><i class="fa-solid fa-arrow-left"></i> Back to Sign In</a>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/notifications.js"></script>
    <script src="../js/validators.js"></script>
    <script>
        const BASE_URL = `http://${window.location.hostname}:3000`;
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');

        function showResult(success, title, msg) {
            document.getElementById('reset-form').style.display = 'none';
            document.getElementById('result-icon').innerHTML = success
                ? '<i class="fa-solid fa-circle-check" style="color:var(--color-success)"></i>'
                : '<i class="fa-solid fa-circle-xmark" style="color:var(--color-error)"></i>';
            document.getElementById('result-title').textContent = title;
            document.getElementById('result-msg').textContent = msg;
            document.getElementById('result-panel').style.display = '';
        }

        // If no token in URL, show error immediately
        if (!token) {
            showResult(false, 'Invalid Link', 'No reset token found. Please request a new password reset link.');
        }

        document.getElementById('reset-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const btn = document.getElementById('reset-btn');

            if (!Validators.password(newPassword)) {
                Notifications.error('Error', 'Password must be at least 6 characters');
                return;
            }
            if (newPassword !== confirmPassword) {
                Notifications.error('Error', 'Passwords do not match');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Resetting…';

            try {
                const res = await fetch(`${BASE_URL}/api/auth/reset-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, password: newPassword })
                });
                const data = await res.json();

                if (data.success) {
                    showResult(true, 'Password Reset!', 'Your password has been updated. You can now log in with your new password.');
                } else {
                    showResult(false, 'Reset Failed', data.error || 'The link is invalid or has expired.');
                }
            } catch (err) {
                showResult(false, 'Network Error', 'Could not reach the server. Please try again.');
            }
        });
    </script>
</body>

</html>
