<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | Digital Calendar for Academic Institute</title>
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/pages.css">
    <link rel="stylesheet" href="../css/theme-toggle.css">
    <script src="../js/theme.js"></script>
    <style>
        .otp-display {
            background: var(--color-primary-50);
            border: 2px dashed var(--color-primary);
            border-radius: var(--radius-md);
            padding: var(--space-4);
            text-align: center;
            margin-bottom: var(--space-4);
        }

        .otp-display .otp-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: var(--space-2);
        }

        .otp-display .otp-code {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 0.5em;
            color: var(--color-primary);
            font-family: 'Courier New', monospace;
        }

        .otp-display .otp-note {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: var(--space-2);
        }

        .step-section {
            display: none;
        }

        .step-section.active {
            display: block;
        }

        .method-options {
            display: flex;
            gap: var(--space-3);
            margin-bottom: var(--space-4);
        }

        .method-option {
            flex: 1;
            padding: var(--space-4);
            border: 2px solid var(--border-default);
            border-radius: var(--radius-md);
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            background: var(--glass-bg);
        }

        .method-option:hover {
            border-color: var(--color-primary);
        }

        .method-option.selected {
            border-color: var(--color-primary);
            background: var(--color-primary-50);
        }

        .method-option i {
            font-size: 1.5rem;
            display: block;
            margin-bottom: var(--space-2);
            color: var(--text-secondary);
        }

        .method-option.selected i {
            color: var(--color-primary);
        }

        .method-option span {
            font-size: 0.9rem;
            font-weight: 600;
        }

        .user-info-badge {
            background: var(--color-primary-50);
            border-radius: var(--radius-md);
            padding: var(--space-3);
            margin-bottom: var(--space-4);
            text-align: center;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .user-info-badge strong {
            color: var(--text-primary);
        }
    </style>
</head>

<body>
    <div class="login-page">
        <button class="theme-toggle login-theme-toggle" aria-label="Toggle theme"><span class="theme-toggle-knob"><i
                    class="fa-solid fa-moon theme-toggle-icon theme-toggle-icon-dark"></i><i
                    class="fa-solid fa-sun theme-toggle-icon theme-toggle-icon-light"></i></span></button>
        <div class="login-container">
            <div class="login-card">
                <div class="login-header">
                    <div class="login-logo"><i class="fa-solid fa-key"></i></div>
                    <h1 class="login-title">Forgot Password</h1>
                    <p class="login-subtitle" id="step-subtitle">Choose how to verify your identity</p>
                </div>

                <div class="login-body">

                    <!-- Step 1: Choose method and enter email/phone -->
                    <div class="step-section active" id="step-1">
                        <div class="method-options">
                            <div class="method-option selected" data-method="email" onclick="selectMethod('email')">
                                <i class="fa-solid fa-envelope"></i>
                                <span>Email</span>
                            </div>
                            <div class="method-option" data-method="phone" onclick="selectMethod('phone')">
                                <i class="fa-solid fa-phone"></i>
                                <span>Phone</span>
                            </div>
                        </div>

                        <div class="form-group" id="email-group">
                            <label class="form-label required" for="reset-email">Email Address</label>
                            <input type="email" id="reset-email" class="form-input" placeholder="your@email.edu"
                                required>
                        </div>

                        <div class="form-group" id="phone-group" style="display: none;">
                            <label class="form-label required" for="reset-phone">Phone Number</label>
                            <input type="tel" id="reset-phone" class="form-input" placeholder="10-digit phone number">
                        </div>

                        <button type="button" class="btn btn-primary btn-lg w-full" id="send-otp-btn"
                            onclick="sendOTP()">
                            <i class="fa-solid fa-paper-plane"></i> Send OTP
                        </button>
                    </div>

                    <!-- Step 2: OTP display + verification -->
                    <div class="step-section" id="step-2">
                        <div class="user-info-badge" id="user-info-badge"></div>

                        <div class="otp-display">
                            <div class="otp-label"><i class="fa-solid fa-shield-halved"></i> Your One-Time Password
                            </div>
                            <div class="otp-code" id="otp-code">------</div>
                            <div class="otp-note">In production, this OTP would be sent via email/SMS</div>
                        </div>

                        <div class="form-group">
                            <label class="form-label required" for="otp-input">Enter OTP</label>
                            <input type="text" id="otp-input" class="form-input" placeholder="Enter 6-digit OTP"
                                maxlength="6" pattern="[0-9]{6}"
                                style="text-align: center; font-size: 1.2rem; letter-spacing: 0.3em;">
                        </div>

                        <button type="button" class="btn btn-primary btn-lg w-full" id="verify-otp-btn"
                            onclick="verifyOTP()">
                            <i class="fa-solid fa-check-circle"></i> Verify OTP
                        </button>
                    </div>

                    <!-- Step 3: New password -->
                    <div class="step-section" id="step-3">
                        <div class="form-group">
                            <label class="form-label required" for="new-password">New Password</label>
                            <input type="password" id="new-password" class="form-input"
                                placeholder="Minimum 6 characters" required>
                        </div>

                        <div class="form-group">
                            <label class="form-label required" for="confirm-password">Confirm New Password</label>
                            <input type="password" id="confirm-password" class="form-input"
                                placeholder="Re-enter password" required>
                        </div>

                        <button type="button" class="btn btn-primary btn-lg w-full" id="reset-btn"
                            onclick="resetPassword()">
                            <i class="fa-solid fa-lock"></i> Reset Password
                        </button>
                    </div>

                    <!-- Step 4: Success -->
                    <div class="step-section" id="step-4">
                        <div class="text-center p-4"
                            style="background: var(--color-success-bg); border-radius: var(--radius-md);">
                            <p class="text-success font-semibold" style="font-size: 1.1rem;">
                                <i class="fa-solid fa-check-circle"></i> Password Reset Successful!
                            </p>
                            <p class="text-sm text-secondary mt-2">Your password has been updated. Redirecting to
                                login...</p>
                        </div>
                    </div>
                </div>

                <div class="login-footer">
                    <a href="../login.html"><i class="fa-solid fa-arrow-left"></i> Back to Sign In</a>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/data.js"></script>
    <script src="../js/notifications.js"></script>
    <script src="../js/validators.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/utils.js"></script>
    <script>
        const API_BASE = `http://${window.location.hostname}:3000`;
        let selectedMethod = 'email';
        let currentUserId = null;
        let resetToken = null;

        function selectMethod(method) {
            selectedMethod = method;
            document.querySelectorAll('.method-option').forEach(el => el.classList.remove('selected'));
            document.querySelector(`[data-method="${method}"]`).classList.add('selected');

            document.getElementById('email-group').style.display = method === 'email' ? 'block' : 'none';
            document.getElementById('phone-group').style.display = method === 'phone' ? 'block' : 'none';
        }

        function showStep(stepNum) {
            document.querySelectorAll('.step-section').forEach(el => el.classList.remove('active'));
            document.getElementById(`step-${stepNum}`).classList.add('active');

            const subtitles = {
                1: 'Choose how to verify your identity',
                2: 'Enter the OTP to verify your identity',
                3: 'Create your new password',
                4: 'All done!'
            };
            document.getElementById('step-subtitle').textContent = subtitles[stepNum];
        }

        async function sendOTP() {
            const value = selectedMethod === 'email'
                ? document.getElementById('reset-email').value.trim()
                : document.getElementById('reset-phone').value.trim();

            if (!value) {
                Notifications.error('Error', `Please enter your ${selectedMethod}`);
                return;
            }

            const btn = document.getElementById('send-otp-btn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Sending...';

            try {
                const response = await fetch(`${API_BASE}/api/auth/forgot-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ method: selectedMethod, value })
                });
                const data = await response.json();

                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> Send OTP';

                if (!data.success) {
                    Notifications.error('Error', data.error || 'Failed to send OTP');
                    return;
                }

                currentUserId = data.userId;
                document.getElementById('otp-code').textContent = data.otp;
                document.getElementById('user-info-badge').innerHTML =
                    `Resetting password for <strong>${data.userName}</strong>`;

                showStep(2);
                Notifications.success('OTP Generated', 'Enter the OTP shown above to proceed');
            } catch (error) {
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> Send OTP';
                Notifications.error('Error', 'Network error. Please try again.');
            }
        }

        async function verifyOTP() {
            const otp = document.getElementById('otp-input').value.trim();

            if (!otp || otp.length !== 6) {
                Notifications.error('Error', 'Please enter the 6-digit OTP');
                return;
            }

            const btn = document.getElementById('verify-otp-btn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Verifying...';

            try {
                const response = await fetch(`${API_BASE}/api/auth/verify-otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: currentUserId, otp })
                });
                const data = await response.json();

                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-check-circle"></i> Verify OTP';

                if (!data.success) {
                    Notifications.error('Error', data.error || 'OTP verification failed');
                    return;
                }

                resetToken = data.resetToken;
                showStep(3);
                Notifications.success('Verified', 'OTP verified! Now set your new password.');
            } catch (error) {
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-check-circle"></i> Verify OTP';
                Notifications.error('Error', 'Network error. Please try again.');
            }
        }

        async function resetPassword() {
            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            if (!newPassword || newPassword.length < 6) {
                Notifications.error('Error', 'Password must be at least 6 characters');
                return;
            }

            if (newPassword !== confirmPassword) {
                Notifications.error('Error', 'Passwords do not match');
                return;
            }

            const btn = document.getElementById('reset-btn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Resetting...';

            try {
                const response = await fetch(`${API_BASE}/api/auth/reset-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ resetToken, newPassword })
                });
                const data = await response.json();

                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-lock"></i> Reset Password';

                if (!data.success) {
                    Notifications.error('Error', data.error || 'Failed to reset password');
                    return;
                }

                showStep(4);
                Notifications.success('Success', 'Password has been reset!');
                setTimeout(() => {
                    window.location.href = '../login.html';
                }, 2500);
            } catch (error) {
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-lock"></i> Reset Password';
                Notifications.error('Error', 'Network error. Please try again.');
            }
        }
    </script>
</body>

</html>
