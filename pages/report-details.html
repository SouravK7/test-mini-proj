<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Details | Digital Calendar for Academic Institute</title>
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/pages.css">
    <link rel="stylesheet" href="../css/theme-toggle.css">
    <script src="../js/theme.js"></script>
    <style>
        .detail-group {
            margin-bottom: 1.5rem;
        }

        .detail-label {
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-bottom: 0.25rem;
        }

        .detail-value {
            font-size: 1rem;
            color: var(--text-primary);
            font-weight: 500;
        }

        .report-section {
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .report-section:last-child {
            border-bottom: none;
            padding-bottom: 0;
            margin-bottom: 0;
        }
    </style>
</head>

<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <div class="sidebar-logo-icon"><i class="fa-solid fa-landmark"></i></div><span>Resource
                        Booking</span>
                </div>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-section">
                    <div class="nav-section-title">Main</div>
                    <a href="dashboard.html" class="nav-item"><span class="nav-item-icon"><i
                                class="fa-solid fa-chart-bar"></i></span>Dashboard</a>
                    <a href="resources.html" class="nav-item"><span class="nav-item-icon"><i
                                class="fa-solid fa-futbol"></i></span>Resources</a>
                    <a href="calendar.html" class="nav-item"><span class="nav-item-icon"><i
                                class="fa-solid fa-calendar-days"></i></span>Calendar</a>
                </div>
                <div class="nav-section">
                    <div class="nav-section-title">Bookings</div>
                    <a href="booking-form.html" class="nav-item"><span class="nav-item-icon"><i
                                class="fa-solid fa-plus"></i></span>New Booking</a>
                    <a href="my-bookings.html" class="nav-item"><span class="nav-item-icon"><i
                                class="fa-solid fa-clipboard-list"></i></span>My Bookings</a>
                </div>
                <div class="nav-section" data-role="user,faculty,admin">
                    <div class="nav-section-title">Usage Management</div>
                    <a href="usage-upload.html" class="nav-item" data-role="user,faculty,admin"><span
                            class="nav-item-icon"><i class="fa-solid fa-cloud-arrow-up"></i></span>Upload Usage</a>
                </div>
                <div class="nav-section" data-role="admin">
                    <div class="nav-section-title">Approval & Reports</div>
                    <a href="approvals.html" class="nav-item" data-role="admin"><span class="nav-item-icon"><i
                                class="fa-solid fa-check"></i></span>Approvals</a>
                    <a href="reports.html" class="nav-item active" data-role="admin"><span class="nav-item-icon"><i
                                class="fa-solid fa-chart-line"></i></span>Reports</a>
                </div>
            </nav>
            <div class="sidebar-footer">
                <a href="javascript:void(0)" class="nav-item" onclick="AUTH.logout()"><span class="nav-item-icon"><i
                            class="fa-solid fa-right-from-bracket"></i></span>Logout</a>
            </div>
        </aside>

        <main class="main-content">
            <header class="navbar">
                <div class="navbar-left flex items-center gap-4">
                    <button class="btn btn-ghost mobile-menu-btn" aria-label="Menu"><i
                            class="fa-solid fa-bars"></i></button>
                    <a href="reports.html" class="btn btn-ghost btn-sm" style="padding: 0.25rem 0.5rem;"><i
                            class="fa-solid fa-arrow-left"></i> Back to Reports</a>
                </div>
                <div class="navbar-right">
                    <button class="theme-toggle" aria-label="Toggle theme"><span class="theme-toggle-knob"><i
                                class="fa-solid fa-moon theme-toggle-icon theme-toggle-icon-dark"></i><i
                                class="fa-solid fa-sun theme-toggle-icon theme-toggle-icon-light"></i></span></button>
                    <div class="navbar-user">
                        <div class="navbar-user-info">
                            <div class="navbar-user-name">-</div>
                            <div class="navbar-user-role">-</div>
                        </div>
                        <div class="avatar">--</div>
                    </div>
                </div>
            </header>

            <div class="page-content">
                <div class="page-header flex justify-between items-center">
                    <div>
                        <h2 class="page-title">Report Details</h2>
                        <p class="page-subtitle">Detailed view of the booking and usage report</p>
                    </div>
                    <div id="booking-status-badge"></div>
                </div>

                <div id="report-details-container">
                    <div class="card p-6 text-center">
                        <div class="spinner mx-auto"></div>
                        <p class="mt-4 text-secondary">Loading report details...</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Template for rendering report details -->
    <template id="report-details-template">
        <div class="grid grid-cols-1 md-grid-cols-2 gap-6">
            <div class="card md-col-span-2">
                <div class="card-header">
                    <h3 class="card-title"><i class="fa-solid fa-clipboard-list"></i> General Information</h3>
                </div>
                <div class="card-body">
                    <div class="grid grid-cols-1 sm-grid-cols-2 md-grid-cols-4 gap-4">
                        <div class="detail-group">
                            <div class="detail-label">Booking ID</div>
                            <div class="detail-value" id="detail-booking-id">-</div>
                        </div>
                        <div class="detail-group">
                            <div class="detail-label">Booking Date</div>
                            <div class="detail-value" id="detail-date">-</div>
                        </div>
                        <div class="detail-group">
                            <div class="detail-label">Time Slot</div>
                            <div class="detail-value" id="detail-slot">-</div>
                        </div>
                        <div class="detail-group">
                            <div class="detail-label">Created At</div>
                            <div class="detail-value" id="detail-created-at">-</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <h3 class="card-title"><i class="fa-solid fa-futbol"></i> Resource Details</h3>
                </div>
                <div class="card-body">
                    <div class="detail-group">
                        <div class="detail-label">Resource Name</div>
                        <div class="detail-value" id="detail-resource-name">-</div>
                    </div>
                    <div class="detail-group">
                        <div class="detail-label">Location</div>
                        <div class="detail-value" id="detail-resource-location">-</div>
                    </div>
                    <div class="detail-group">
                        <div class="detail-label">Purpose of Booking</div>
                        <div class="detail-value" id="detail-purpose">-</div>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <h3 class="card-title"><i class="fa-solid fa-user"></i> User Details</h3>
                </div>
                <div class="card-body">
                    <div class="detail-group">
                        <div class="detail-label">Name</div>
                        <div class="detail-value" id="detail-user-name">-</div>
                    </div>
                    <div class="detail-group">
                        <div class="detail-label">Email</div>
                        <div class="detail-value" id="detail-user-email">-</div>
                    </div>
                    <div class="detail-group">
                        <div class="detail-label">Role</div>
                        <div class="detail-value" id="detail-user-role" style="text-transform: capitalize;">-</div>
                    </div>
                </div>
            </div>

            <div class="card md-col-span-2">
                <div class="card-header">
                    <h3 class="card-title"><i class="fa-solid fa-file-invoice"></i> Usage Report (Feedback & Evidence)
                    </h3>
                </div>
                <div class="card-body" id="usage-report-section">
                    <!-- Dynamic content will go here -->
                </div>
            </div>

            <div class="card md-col-span-2" id="approval-details-card" style="display: none;">
                <div class="card-header">
                    <h3 class="card-title"><i class="fa-solid fa-list-check"></i> Approval Status</h3>
                </div>
                <div class="card-body">
                    <div class="grid grid-cols-1 sm-grid-cols-2 gap-4" id="approval-details-content">
                        <!-- Dynamic content -->
                    </div>
                </div>
            </div>
        </div>
    </template>

    <script src="../js/data.js"></script>
    <script src="../js/notifications.js"></script>
    <script src="../js/validators.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/app.js"></script>
</body>

</html>
